appId: host.exp.exponent
---
- clearState

- launchApp

# Força o Expo Go a abrir o seu projeto localmente (verifique a porta no seu terminal do expo)
- openLink: exp://127.0.0.1:8081

- tapOn: "Continue"
- tapOn: "Reload"

- extendedWaitUntil:
    visible: "Criar cadastro"
    timeout: 60000
    
# Aguarda até 30 segundos para o Expo Go carregar a interface (o primeiro bundle costuma demorar)
- extendedWaitUntil:
    visible: "Criar cadastro"
    timeout: 60000

